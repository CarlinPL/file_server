name: Terraform CI/CD


on:
  workflow_dispatch: # Trigger manual para inicio do workflow
    inputs:
      apply:
        description: 'Executar o terraform apply ?'
        required: true
        default: 'false'
        type: choice
        options: 
          - 'true'
          - 'false'

permissions:
  id-token: write
  contents: read



jobs:
  job1:
    name: Terraform CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@v6.2.1
        with:
          role-to-assume: arn:aws:iam::922806890269:role/git-infra-role
          aws-region: sa-east-1

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v2.0.3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate
      
      - name: Terraform Plan
        run: terraform plan -out=tfplan.tfout

      - name: Terrafomr apply
        run: terraform apply -auto-approve tfplan
        if: github.event.input.apply == 'true'
  